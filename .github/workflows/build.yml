name: Build IronWrench EXE
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create Fresh Package Config
        shell: pwsh
        run: |
          if (Test-Path package.json) { Remove-Item package.json -Force }
          if (Test-Path package-lock.json) { Remove-Item package-lock.json -Force }
          $package = @{
              name = "ironwrench"
              version = "1.0.0"
              main = "main.js"
              dependencies = @{
                  expo = "~52.0.0"
                  "expo-router" = "~4.0.0"
                  "expo-constants" = "~17.0.0"
                  "expo-linking" = "~7.0.0"
                  "expo-status-bar" = "~2.0.0"
                  react = "18.3.1"
                  "react-dom" = "18.3.1"
                  "react-native" = "0.76.0"
                  "react-native-safe-area-context" = "4.12.0"
                  "react-native-screens" = "~4.0.0"
                  "react-native-web" = "~0.19.0"
              }
              devDependencies = @{
                  electron = "latest"
                  "electron-builder" = "latest"
              }
          }
          $package | ConvertTo-Json | Out-File -FilePath package.json -Encoding utf8

      - name: Install dependencies
        run: npm install --force

      - name: Build Web Version
        run: npx expo export:web

      - name: Build Windows EXE
        run: npx electron-builder build --windows --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: IronWrench-Windows-App
          path: dist/*.exe
