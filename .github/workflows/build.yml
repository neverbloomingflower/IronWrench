name: Build IronWrench EXE
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Repair Package and Create Entry
        shell: pwsh
        run: |
          # 1. Load and Fix Package.json
          $json = Get-Content package.json | ConvertFrom-Json
          $json.dependencies | Add-Member -MemberType NoteProperty -Name "react" -Value "18.3.1" -Force
          $json.dependencies | Add-Member -MemberType NoteProperty -Name "react-dom" -Value "18.3.1" -Force
          $json.dependencies | Add-Member -MemberType NoteProperty -Name "react-native" -Value "0.76.9" -Force
          $json.dependencies | Add-Member -MemberType NoteProperty -Name "react-native-web" -Value "~0.19.13" -Force
          
          # Force entry point to main.js
          $json.main = "main.js"

          # Configure build to include the dist folder and our new main.js
          if ($null -eq $json.build) { $json | Add-Member -MemberType NoteProperty -Name "build" -Value @{} }
          $json.build | Add-Member -MemberType NoteProperty -Name "directories" -Value @{ "output" = "dist-exe" } -Force
          $json.build | Add-Member -MemberType NoteProperty -Name "files" -Value @("dist/**/*", "main.js") -Force
          $json.build | Add-Member -MemberType NoteProperty -Name "asar" -Value $true -Force

          $json | ConvertTo-Json -Depth 10 | Out-File package.json -Encoding utf8

          # 2. CREATE THE MISSING main.js FILE
          $mainJs = @"
          const { app, BrowserWindow } = require('electron');
          const path = require('path');
          function createWindow() {
            const win = new BrowserWindow({ width: 1200, height: 800 });
            win.loadFile(path.join(__dirname, 'dist/index.html'));
          }
          app.whenReady().then(createWindow);
          app.on('window-all-closed', () => { if (process.platform !== 'darwin') app.quit(); });
          "@
          $mainJs | Out-File -FilePath main.js -Encoding utf8

      - name: Install dependencies
        run: npm install --force

      - name: Force Fix Expo Dependencies
        run: |
          npx expo install --fix
          npx expo install expo-font @expo/vector-icons

      - name: Build Web Version (Metro)
        run: npx expo export --platform web

      - name: Build Windows EXE
        run: npx electron-builder build --windows --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: IronWrench-Windows-App
          path: dist-exe/*.exe
