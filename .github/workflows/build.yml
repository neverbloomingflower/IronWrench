name: Build IronWrench EXE
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Force Clean Package Config
        # This replaces the messy versions with stable ones before installing
        run: |
          npm install -g json
          npx json -I -f package.json -e "this.dependencies.react='18.3.1'"
          npx json -I -f package.json -e "this.dependencies['react-dom']='18.3.1'"
          npx json -I -f package.json -e "this.dependencies['react-native']='0.76.0'"
          npx json -I -f package.json -d overrides

      - name: Install dependencies
        # Using --force here to tell NPM to just do what it's told
        run: npm install --force

      - name: Build Web Version
        run: npx expo export:web

      - name: Build Windows EXE
        run: |
          npm install --save-dev electron electron-builder --force
          npx electron-builder build --windows --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: IronWrench-Windows-App
          path: dist/*.exe
