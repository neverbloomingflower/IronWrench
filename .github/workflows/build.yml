name: Build IronWrench EXE
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Repair Package Versions
        shell: pwsh
        run: |
          $json = Get-Content package.json | ConvertFrom-Json
          if ($null -eq $json.dependencies) { $json | Add-Member -MemberType NoteProperty -Name "dependencies" -Value @{} }
          if ($null -eq $json.devDependencies) { $json | Add-Member -MemberType NoteProperty -Name "devDependencies" -Value @{} }
          
          # Force core versions
          $json.dependencies | Add-Member -MemberType NoteProperty -Name "react" -Value "18.3.1" -Force
          $json.dependencies | Add-Member -MemberType NoteProperty -Name "react-dom" -Value "18.3.1" -Force
          $json.dependencies | Add-Member -MemberType NoteProperty -Name "react-native" -Value "0.76.9" -Force
          $json.dependencies | Add-Member -MemberType NoteProperty -Name "react-native-web" -Value "~0.19.13" -Force
          
          # Force UI/Font dependencies to prevent 'Unable to resolve' errors
          $json.dependencies | Add-Member -MemberType NoteProperty -Name "expo-font" -Value "~13.0.3" -Force
          $json.dependencies | Add-Member -MemberType NoteProperty -Name "@expo/vector-icons" -Value "^14.0.0" -Force
          
          $json.devDependencies | Add-Member -MemberType NoteProperty -Name "electron" -Value "latest" -Force
          $json.devDependencies | Add-Member -MemberType NoteProperty -Name "electron-builder" -Value "latest" -Force
          
          if ($json.PSObject.Properties.Match('overrides').Count -gt 0) { $json.PSObject.Properties.Remove('overrides') }
          $json | ConvertTo-Json -Depth 10 | Out-File package.json -Encoding utf8

      - name: Install dependencies
        run: npm install --force

      - name: Force Fix Expo Dependencies
        # We run this twice: once to sync and once to ensure all peer deps are satisfied
        run: |
          npx expo install --fix
          npx expo install expo-font @expo/vector-icons

      - name: Build Web Version (Metro)
        run: npx expo export --platform web

      - name: Build Windows EXE
        run: npx electron-builder build --windows --publish never -c.nodeGypRebuild=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: IronWrench-Windows-App
          path: dist/*.exe
