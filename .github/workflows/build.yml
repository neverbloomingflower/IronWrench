name: Build IronWrench EXE
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Repair Package Versions
        shell: pwsh
        run: |
          # 1. Load the package.json
          $json = Get-Content package.json | ConvertFrom-Json
          
          # 2. Fix React versions
          $json.dependencies.react = "18.3.1"
          $json.dependencies."react-dom" = "18.3.1"
          $json.dependencies."react-native" = "0.76.0"
          
          # 3. Safely handle devDependencies
          if ($null -eq $json.devDependencies) {
              $json | Add-Member -MemberType NoteProperty -Name "devDependencies" -Value @{}
          }
          $json.devDependencies | Add-Member -MemberType NoteProperty -Name "electron" -Value "latest" -Force
          $json.devDependencies | Add-Member -MemberType NoteProperty -Name "electron-builder" -Value "latest" -Force
          
          # 4. Remove problematic overrides
          if ($json.PSObject.Properties.Name -contains "overrides") { 
              $json.PSObject.Properties.Remove("overrides") 
          }
          
          # 5. Save back to file
          $json | ConvertTo-Json -Depth 10 | Out-File package.json -Encoding utf8

      - name: Install dependencies
        run: npm install --force

      - name: Build Web Version
        run: npx expo export:web

      - name: Build Windows EXE
        run: npx electron-builder build --windows --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: IronWrench-Windows-App
          path: dist/*.exe
