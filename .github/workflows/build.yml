name: Build IronWrench EXE
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fix Ghost React Version
        # This command forces the package.json to use a version that actually exists
        run: |
          npm install -g json
          npx json -I -f package.json -e "this.dependencies.react='18.3.1'"
          npx json -I -f package.json -e "this.dependencies['react-dom']='18.3.1'"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Version
        run: npx expo export:web

      - name: Build Windows EXE
        run: |
          npm install --save-dev electron electron-builder
          npx electron-builder build --windows --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: IronWrench-Windows-App
          path: dist/*.exe
