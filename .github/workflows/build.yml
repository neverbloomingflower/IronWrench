name: Build IronWrench EXE
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create Fresh Package Config
        # This deletes the messy file and writes a clean one
        run: |
          del package.json
          del package-lock.json
          echo { > package.json
          echo   "name": "ironwrench", >> package.json
          echo   "version": "1.0.0", >> package.json
          echo   "main": "main.js", >> package.json
          echo   "dependencies": { >> package.json
          echo     "expo": "~52.0.0", >> package.json
          echo     "react": "18.3.1", >> package.json
          echo     "react-dom": "18.3.1", >> package.json
          echo     "react-native": "0.76.0" >> package.json
          echo   }, >> package.json
          echo   "devDependencies": { >> package.json
          echo     "electron": "latest", >> package.json
          echo     "electron-builder": "latest" >> package.json
          echo   } >> package.json
          echo } >> package.json

      - name: Install dependencies
        run: npm install --force

      - name: Build Web Version
        run: npx expo export:web

      - name: Build Windows EXE
        run: npx electron-builder build --windows --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: IronWrench-Windows-App
          path: dist/*.exe
