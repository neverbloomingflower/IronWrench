name: Build IronWrench EXE
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Repair Package Versions
        shell: pwsh
        run: |
          # 1. Load your actual package.json
          $json = Get-Content package.json | ConvertFrom-Json
          
          # 2. Fix the non-existent React version (18.3.2 -> 18.3.1)
          if ($json.dependencies.react) { $json.dependencies.react = "18.3.1" }
          if ($json.dependencies."react-dom") { $json.dependencies."react-dom" = "18.3.1" }
          
          # 3. Ensure React Native is at a stable version for Expo 52/55
          if ($json.dependencies."react-native") { $json.dependencies."react-native" = "0.76.0" }
          
          # 4. Remove any "overrides" that cause the EOVERRIDE error
          if ($json.PSObject.Properties.Name -contains "overrides") { 
              $json.PSObject.Properties.Remove("overrides") 
          }
          
          # 5. Add Desktop build tools if missing
          if (!$json.devDependencies) { $json.devDependencies = @{} }
          $json.devDependencies.electron = "latest"
          $json.devDependencies."electron-builder" = "latest"
          
          # 6. Save it back
          $json | ConvertTo-Json -Depth 10 | Out-File package.json -Encoding utf8

      - name: Install dependencies
        run: npm install --force

      - name: Build Web Version
        run: npx expo export:web

      - name: Build Windows EXE
        run: npx electron-builder build --windows --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: IronWrench-Windows-App
          path: dist/*.exe
