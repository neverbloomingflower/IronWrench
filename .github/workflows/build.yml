name: Build IronWrench EXE
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Repair Package Versions
        shell: pwsh
        run: |
          $json = Get-Content package.json | ConvertFrom-Json
          if ($null -eq $json.dependencies) { $json | Add-Member -MemberType NoteProperty -Name "dependencies" -Value @{} }
          if ($null -eq $json.devDependencies) { $json | Add-Member -MemberType NoteProperty -Name "devDependencies" -Value @{} }
          
          # Force core versions
          $json.dependencies | Add-Member -MemberType NoteProperty -Name "react" -Value "18.3.1" -Force
          $json.dependencies | Add-Member -MemberType NoteProperty -Name "react-dom" -Value "18.3.1" -Force
          $json.dependencies | Add-Member -MemberType NoteProperty -Name "react-native" -Value "0.76.0" -Force
          
          # Force Web Support
          $json.dependencies | Add-Member -MemberType NoteProperty -Name "react-native-web" -Value "~0.19.13" -Force
          
          # Add Desktop tools
          $json.devDependencies | Add-Member -MemberType NoteProperty -Name "electron" -Value "latest" -Force
          $json.devDependencies | Add-Member -MemberType NoteProperty -Name "electron-builder" -Value "latest" -Force
          
          if ($json.PSObject.Properties.Match('overrides').Count -gt 0) { $json.PSObject.Properties.Remove('overrides') }
          $json | ConvertTo-Json -Depth 10 | Out-File package.json -Encoding utf8

      - name: Install dependencies
        run: npm install --force

      - name: Auto-fix Expo dependencies
        # This tells Expo to look at your code and install whatever is missing
        run: npx expo install --check

      - name: Build Web Version
        run: npx expo export:web

      - name: Build Windows EXE
        run: npx electron-builder build --windows --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: IronWrench-Windows-App
          path: dist/*.exe
